claims:
  - claim: "StepSecurity's June 16 campaign update explicitly lists mflux-streamlit and mrbios in the Hades cluster family."
    status: confirmed
    evidence:
      - source: "https://www.stepsecurity.io/blog/the-hades-campaign-pypi-packages"
        note: "Table rows show mflux-streamlit 0.0.3, 0.0.4 and mrbios 0.1.1, 0.1.2."

  - claim: "PyPI simple-index snapshots for both packages show quarantined status and no release links."
    status: confirmed
    evidence:
      - source: "https://pypi.org/simple/mflux-streamlit/"
        note: "Live response included meta name=pypi:project-status content=quarantined and an empty links page."
      - source: "https://pypi.org/simple/mrbios/"
        note: "Live response included meta name=pypi:project-status content=quarantined and an empty links page."

  - claim: "The reported malicious version JSON endpoints are unavailable."
    status: confirmed
    evidence:
      - source: "https://pypi.org/pypi/mflux-streamlit/0.0.3/json"
        note: "HTTP 404 returned during live collection."
      - source: "https://pypi.org/pypi/mrbios/0.1.1/json"
        note: "HTTP 404 returned during live collection."

  - claim: "The broader Hades cluster still rests on Python startup-hook and import-time native-extension delivery branches."
    status: confirmed
    evidence:
      - source: "https://socket.dev/blog/shai-hulud-descends-to-hades-miasma-pypi-wave"
        note: "Initial report documents .pth startup hooks and Bun-launched JavaScript."
      - source: "https://socket.dev/blog/mini-shai-hulud-miasma-and-hades-worms-target-bioinformatics-and-mcp-developers-via-malicious"
        note: "June 8 expansion documents native-extension delivery and additional package families."

  - claim: "The update does not expose new hashes or a new delivery branch for mflux-streamlit or mrbios beyond the existing Hades writeup."
    status: not_observed
    evidence:
      - source: "https://www.stepsecurity.io/blog/the-hades-campaign-pypi-packages"
        note: "The accessible report repeats the affected version bands and does not publish new hashes for these packages."
      - source: "https://pypi.org/simple/mflux-streamlit/"
        note: "Registry snapshot is quarantined, limiting recovery of historical release artifacts."
      - source: "https://pypi.org/simple/mrbios/"
        note: "Registry snapshot is quarantined, limiting recovery of historical release artifacts."
