hunts:
  - id: "jetbrains-malicious-plugins-ai-api-key-theft-hunt-1"
    title: "JetBrains plugin and telemetry scope"
    question: "Does the telemetry scope contain indicators associated with the malicious JetBrains Marketplace AI-key theft campaign?"
    telemetry:
      family: "file"
      collection_context: "JetBrains IDE plugin inventory, local files, and exported telemetry"
    positive_signal: "Indicators of compromise matched in telemetry: JetBrains plugin IDs, publisher handles, or C2 network selectors"
