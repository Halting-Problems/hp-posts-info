hunts:
  - id: "optinmonster-supply-chain-attack-hunt-1"
    title: "WordPress filesystem scan for backdoor plugins and indicators"
    question: "Does the local WordPress deployment contain backdoor plugin directories or PHP files containing indicators of the OptinMonster supply chain compromise?"
    telemetry:
      family: "file"
      collection_context: "local wp-content/plugins/ directory or full WordPress root directory"
    positive_signal: "Indicators of compromise matched in filesystem: malicious backdoor plugin directories (content-delivery-helper, database-optimizer) or signature substrings in PHP files"
    script_path: "scripts/hunt_backdoor_filesystem.py"

  - id: "optinmonster-supply-chain-attack-hunt-2"
    title: "WordPress database audit for rogue admin accounts"
    question: "Does the WordPress users table or SQL dump contain unauthorized administrator accounts matching developer_api1 or dev_xxxxxx?"
    telemetry:
      family: "database"
      collection_context: "WordPress MySQL database or SQL dump"
    positive_signal: "Indicators of compromise matched in database: rogue account developer_api1 or randomized dev_* account patterns"
    script_path: "scripts/audit_wordpress_db.py"
