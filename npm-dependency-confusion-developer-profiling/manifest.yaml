hunts:
  - id: "npm-dependency-confusion-developer-profiling-hunt-1"
    title: "workspace and telemetry scan for Microsoft-tracked dependency-confusion indicators"
    question: "Does the checkout or exported telemetry contain the npm dependency-confusion campaign indicators documented by Microsoft?"
    telemetry:
      family: "process"
      collection_context: "repository checkout, package cache, or CI/exported log directory"
    positive_signal: "Matched any of the affected npm scopes, representative package names, version markers, oob.moika.tech, X-Secret, or RECON_ONLY markers"
    false_positives: "Legitimate internal package documentation may mention the same scope names; require package-cache or install telemetry before escalating."
    classification_on_match: "presumed_exposed"
    script_path: "scripts/npm_dependency_confusion_developer_profiling_scope.py"
